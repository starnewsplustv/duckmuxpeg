[multi_platform]
enabled=true
sync_playlists=true

[platform0]
id=atsc_airchain
platform=atsc
enabled=true
output_type=atsc
output_url=qam://frequency=573000000
output_mux_format=ts
output_bitrate=19000
output_programs=channel_1
metadata=psip:primary

[platform1]
id=ott_linear
platform=ott
enabled=true
output_type=rtmp
output_url=rtmp://ott-platform/live/duckmuxpeg
