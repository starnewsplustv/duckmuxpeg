# DuckMuxPeg 2025 - Modern MPEG-2 Statistical Multiplexing Engine Configuration
# High-performance encoding with OBS integration and ATSC 1.0 compliance

[encoder]
# Modern MPEG-2 encoding settings
preset=broadcast                    # ultrafast, superfast, veryfast, faster, fast, medium, slow, slower, veryslow, placebo
tune=film                          # film, animation, grain, stillimage, fastdecode, zerolatency
rate_control=cbr                   # cbr, vbr, crf, abr, cvbr
bitrate=8000                       # Target bitrate in kbps
crf_value=23.0                     # For CRF mode (18-28 typical range)
vbr_maxrate=12000                  # Maximum bitrate for VBR
vbr_bufsize=4000                   # Buffer size for VBR

# Video format
width=1920
height=1080
framerate=29.97                    # 23.976, 24, 25, 29.97, 30, 50, 59.94, 60
aspect_ratio=16_9                  # 4_3, 16_9

# GOP structure
gop_size=30                        # Group of Pictures size
max_b_frames=2                     # Maximum B-frames between I/P frames
enable_open_gop=false              # Open GOP for streaming

# Advanced encoding features (x264-inspired for MPEG-2)
enable_lookahead=true
lookahead_frames=60                # 0-250, higher = better quality, more memory
enable_adaptive_quantization=true
aq_strength=1.0                    # 0.0-3.0, higher = more aggressive AQ
aq_mode=1                          # 0=disabled, 1=variance AQ, 2=auto-variance
enable_mbtree=true                 # Macroblock tree optimization
enable_weighted_prediction=true
enable_mixed_references=true
enable_fast_pskip=true
enable_dct_decimate=true

# Scene change detection
enable_scene_change_detection=true
scene_change_threshold=0.4         # 0.0-1.0, lower = more sensitive

# Psychovisual optimizations
psy_rd=1.0                         # Psychovisual rate-distortion optimization
psy_trellis=0.2                    # Psychovisual trellis optimization

# Noise reduction
enable_noise_reduction=false
nr_intra=0.0                       # Intra-frame noise reduction
nr_inter=0.0                       # Inter-frame noise reduction

# Motion estimation
motion_estimation=medium           # fast, medium, slow, veryslow, placebo

[threading]
# High-core count optimization
thread_count=auto                  # auto, or specific number (1-128)
thread_strategy=hybrid             # frame, slice, pipeline, hybrid, numa_aware
frame_threads=auto                 # Threads for frame-level parallelism
slice_threads=auto                 # Threads for slice-level parallelism
lookahead_threads=auto             # Threads for lookahead analysis

# NUMA and CPU affinity
enable_numa_awareness=true
numa_node=auto                     # auto, or specific node (0, 1, 2, ...)
bind_threads_to_cores=true
use_hyperthreading=true
enable_turbo_boost=true

# Load balancing
load_balancing=work_stealing       # round_robin, work_stealing, complexity_based, adaptive, numa_locality
enable_work_stealing=true

# Performance tuning
thread_priority=normal             # low, normal, high, realtime
stack_size_mb=8                    # Thread stack size
sync_interval_frames=10            # Synchronization interval

[buffering]
# RAM buffer management
enable_ram_buffer=true
ram_buffer_size_mb=2048            # 256-32768 MB depending on system RAM
enable_large_buffers=auto          # auto, true, false (for 64GB+ systems)

# Ramdrive support for ultra-low latency
enable_ramdrive=false
ramdrive_path=/tmp/duckmuxpeg-buffer
ramdrive_size_mb=4096

# Compression and caching
enable_compression=true
compression_algorithm=lz4          # none, lz4, zstd
compression_level=1                # 1-9 for zstd, 1-12 for lz4hc
enable_write_cache=true
enable_read_cache=true
cache_size_mb=256

# Memory optimization
enable_zero_copy=true
enable_memory_pools=true
memory_pool_size_mb=1024
enable_prefetching=true

[compliance]
# ATSC 1.0 broadcast compliance
standard=atsc_1_0                  # atsc_1_0, atsc_3_0, dvb, isdb
video_format=hdtv_1080i            # hdtv_720p, hdtv_1080i, hdtv_1080p, sdtv_480i, sdtv_480p
enable_closed_captioning=true
closed_captioning_format=cea_708   # cea_608, cea_708
enable_audio_description=false

# Real-time monitoring
enable_compliance_monitoring=true
compliance_check_interval_ms=1000
export_compliance_reports=true
compliance_report_path=./reports/

[psip]
# Program and System Information Protocol tables
transport_stream_id=1
protocol_version=0
rating_region=1

# Master Guide Table (MGT)
enable_mgt=true
mgt_version=0

# Virtual Channel Table (VCT)
enable_vct=true
vct_version=0

# Event Information Table (EIT)
enable_eit=true
eit_version=0

# System Time Table (STT)
enable_stt=true
stt_version=0
gps_utc_offset=18                  # Current GPS-UTC offset

# Rating Region Table (RRT)
enable_rrt=true
rrt_version=0

[channels]
# Virtual channel configuration
# Multiple channels can be defined as [channel_N]

[channel_1]
short_name=NEWS-HD                 # 7 characters max
major_channel_number=7
minor_channel_number=1
modulation_mode=8                  # 8VSB for ATSC
carrier_frequency=533000000        # Hz
channel_tsid=1
program_number=1
service_type=2                     # 1=Analog TV, 2=Digital TV, 3=Digital Audio, 4=Data
source_id=1
access_controlled=false
hidden=false
hide_guide=false

[channel_2]
short_name=SPORTS
major_channel_number=7
minor_channel_number=2
modulation_mode=8
carrier_frequency=533000000
channel_tsid=1
program_number=2
service_type=2
source_id=2
access_controlled=false
hidden=false
hide_guide=false

[inputs]
# Input source configuration

[input_1]
type=file                          # file, udp, rtmp, obs, webcam
url=test_1080p.mp4
codec=h264
enabled=true
# For live inputs
# type=udp
# url=udp://239.1.1.1:1234

[input_2]
type=obs
url=obs://scene1
codec=h264
enabled=false

[outputs]
# Output destination configuration

[output_1]
type=udp                           # udp, rtmp, file, qam, atsc
url=udp://239.0.0.1:1234
mux_format=ts                      # ts (transport stream), mp4, mkv
programs=channel_1,channel_2

[playlist]
enabled=true
rotation_mode=sequential
allow_live_insertions=true

[playlist_item0]
id=morning_block
