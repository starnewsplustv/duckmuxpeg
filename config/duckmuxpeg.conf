[output_2]
type=file
url=./output/broadcast_stream.ts
mux_format=ts
programs=channel_1,channel_2

[statmux]
# Statistical multiplexing configuration
buffer_size_ms=1000                # Buffer size in milliseconds
update_interval_ms=100             # Bitrate update interval
min_bitrate_factor=0.5             # Minimum bitrate as factor of target
max_bitrate_factor=1.5             # Maximum bitrate as factor of target
adaptive_gop=true                  # Enable adaptive GOP sizing
scene_change_detection=true        # Enable scene change detection
max_concurrent_streams=16          # Maximum concurrent input streams

# Quality-based multiplexing
enable_quality_based_allocation=true
quality_threshold=0.95             # SSIM threshold for quality
complexity_weight=0.6              # Weight for complexity in allocation
motion_weight=0.3                  # Weight for motion in allocation
temporal_weight=0.1                # Weight for temporal consistency

[obs]
# OBS Studio integration
enabled=true
obs_websocket_url=ws://localhost:4444
obs_websocket_password=
obs_port=9999
enable_scene_monitoring=true
scene_names=Scene 1,Scene 2,Gaming,Webcam

# UI preferences
enable_ui_panels=true
auto_refresh_enabled=true
refresh_interval_ms=1000
show_advanced_options=false
enable_notifications=true

[logging]
# Logging configuration
log_level=info                     # debug, info, warn, error, fatal
log_file=./logs/duckmuxpeg.log
enable_console_colors=true
enable_file_logging=true
max_log_file_size_mb=100
max_log_files=5

[performance]
# Performance monitoring and optimization
enable_performance_monitoring=true
enable_detailed_stats=true
stats_update_interval_ms=500
enable_profiling=false
profile_output_file=./performance.json

# CPU optimizations
cpu_governor=performance           # performance, ondemand, conservative
disable_cpu_freq_scaling=true
enable_cpu_affinity=true

# Memory optimizations
vm_overcommit_memory=1             # 0=heuristic, 1=always, 2=never
vm_swappiness=10                   # 0-100, lower = less swapping
transparent_hugepages=always       # always, madvise, never

[network]
# Network optimization for streaming
tcp_rmem_max=134217728            # TCP receive buffer max
tcp_wmem_max=134217728            # TCP send buffer max
udp_rmem_default=262144           # UDP receive buffer default
udp_wmem_default=262144           # UDP send buffer default

# Streaming specific
enable_low_latency_mode=false
target_latency_ms=500
jitter_buffer_ms=100
packet_loss_threshold=0.01

[hardware]
# Hardware acceleration
enable_gpu_acceleration=false
gpu_device=auto                    # auto, cuda:0, opencl:0, vaapi
enable_fpga_acceleration=false
fpga_device=auto

# Hardware-specific optimizations
enable_simd_optimizations=true
use_avx2=auto                     # auto, true, false
use_avx512=auto                   # auto, true, false
use_neon=auto                     # auto, true, false (ARM)

[security]
# Security and access control
enable_authentication=false
api_key=
allowed_hosts=127.0.0.1,localhost
enable_ssl=false
ssl_cert_path=
ssl_key_path=

[maintenance]
# Maintenance and cleanup
enable_auto_cleanup=true
cleanup_interval_hours=24
max_temp_file_age_hours=48
max_log_age_days=30
enable_health_checks=true
health_check_interval_ms=5000