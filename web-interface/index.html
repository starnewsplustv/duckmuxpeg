<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DuckMuxPeg 2025 - Matrix Interface</title>
    <meta name="description" content="Advanced MPEG-2 encoder with quantum matrix interface and dynamic spacescape visualization." />
    
    <!-- Preload fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Favicon and App Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    
    <!-- Meta tags for rich previews -->
    <meta property="og:title" content="DuckMuxPeg 2025 - Matrix Interface" />
    <meta property="og:description" content="Hyper-modern interface with advanced matrix mapping layers and dynamic spacescape background." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.jpg" />
    
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DuckMuxPeg 2025 - Matrix Interface" />
    <meta name="twitter:description" content="Advanced quantum interface for professional MPEG-2 encoding." />
    
    <style>
      /* Critical CSS for loading state */
      body {
        margin: 0;
        padding: 0;
        background: #0a0a0f;
        color: white;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        overflow: hidden;
      }
      
      #root {
        width: 100vw;
        height: 100vh;
      }
      
      /* Loading animation */
      .loading-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #0a0a0f 0%, #1a1a24 50%, #252530 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        z-index: 9999;
      }
      
      .loading-spinner {
        width: 60px;
        height: 60px;
        border: 3px solid rgba(0, 212, 255, 0.3);
        border-top: 3px solid #00d4ff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      
      .loading-text {
        color: #00d4ff;
        font-size: 18px;
        font-weight: 600;
        text-align: center;
        opacity: 0.8;
      }
      
      .loading-subtitle {
        color: rgba(255, 255, 255, 0.6);
        font-size: 14px;
        margin-top: 10px;
        text-align: center;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      /* Hide loading when app loads */
      .app-loaded .loading-container {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.5s ease;
      }
      
      /* Quantum particles background for loading */
      .quantum-bg {
        position: absolute;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      
      .quantum-particle {
        position: absolute;
        width: 2px;
        height: 2px;
        background: #00d4ff;
        border-radius: 50%;
        animation: float 3s ease-in-out infinite;
        opacity: 0.6;
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0px) scale(1); opacity: 0.6; }
        50% { transform: translateY(-20px) scale(1.2); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Loading Screen -->
      <div class="loading-container">
        <div class="quantum-bg">
          <!-- Animated particles will be added by JavaScript -->
        </div>
        <div class="loading-spinner"></div>
        <div class="loading-text">Initializing Quantum Matrix</div>
        <div class="loading-subtitle">Loading advanced interface components...</div>
      </div>
    </div>
    
    <script>
      // Create animated particles for loading screen
      function createQuantumParticles() {
        const bg = document.querySelector('.quantum-bg');
        const particleCount = 50;
        
        for (let i = 0; i < particleCount; i++) {
          const particle = document.createElement('div');
          particle.className = 'quantum-particle';
          particle.style.left = Math.random() * 100 + '%';
          particle.style.top = Math.random() * 100 + '%';
          particle.style.animationDelay = Math.random() * 3 + 's';
          particle.style.animationDuration = (2 + Math.random() * 2) + 's';
          bg.appendChild(particle);
        }
      }
      
      // Initialize particles
      createQuantumParticles();
      
      // Hide loading screen when app loads
      window.addEventListener('load', () => {
        setTimeout(() => {
          document.body.classList.add('app-loaded');
        }, 1000);
      });
      
      // Performance monitoring
      if ('performance' in window) {
        window.addEventListener('load', () => {
          setTimeout(() => {
            const perfData = performance.getEntriesByType('navigation')[0];
            console.log('🚀 Interface Load Time:', Math.round(perfData.loadEventEnd - perfData.loadEventStart), 'ms');
          }, 0);
        });
      }
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
